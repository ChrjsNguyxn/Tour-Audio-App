<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Food Tour App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

    <div id="loginSection" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Đăng Nhập Admin</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Tên đăng nhập</label>
                <input id="username" type="text" value="admin" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Mật khẩu</label>
                <input id="password" type="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <button onclick="login()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                Đăng Nhập
            </button>
            <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden flex h-screen bg-gray-100">
        <div class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-gray-800">
                <i class="fa-solid fa-utensils mr-2 text-blue-400"></i>FoodTour
            </div>
            <nav class="flex-1 px-4 py-4 space-y-2">
                <a href="#" class="block px-4 py-2 bg-gray-800 rounded text-blue-400"><i class="fa-solid fa-chart-pie mr-2"></i> Tổng quan</a>
                <a href="#" class="block px-4 py-2 hover:bg-gray-800 rounded transition"><i class="fa-solid fa-store mr-2"></i> Quán ăn</a>
                <a href="#" class="block px-4 py-2 hover:bg-gray-800 rounded transition"><i class="fa-solid fa-users mr-2"></i> Người dùng</a>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded transition">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i> Đăng xuất
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6">
                <h1 class="text-xl font-semibold text-gray-800">Bảng điều khiển</h1>
                <div class="flex items-center">
                    <span class="text-gray-600 mr-2">Xin chào, Admin</span>
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-lg shadow p-6 flex items-center">
                        <div class="p-3 rounded-full bg-blue-100 text-blue-500 mr-4">
                            <i class="fa-solid fa-users text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-gray-500 text-sm">Tổng người dùng</p>
                            <p id="totalUsers" class="text-2xl font-bold text-gray-800">...</p>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow p-6 flex items-center">
                        <div class="p-3 rounded-full bg-green-100 text-green-500 mr-4">
                            <i class="fa-solid fa-store text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-gray-500 text-sm">Tổng quán ăn</p>
                            <p id="totalEateries" class="text-2xl font-bold text-gray-800">...</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 flex items-center">
                        <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                            <i class="fa-solid fa-clock text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-gray-500 text-sm">Quán chờ duyệt</p>
                            <p id="totalPendingEateries" class="text-2xl font-bold text-gray-800">...</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 flex items-center">
                        <div class="p-3 rounded-full bg-red-100 text-red-500 mr-4">
                            <i class="fa-solid fa-burger text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-gray-500 text-sm">Tổng món ăn</p>
                            <p id="totalMenuItems" class="text-2xl font-bold text-gray-800">...</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 flex items-center">
                        <div class="p-3 rounded-full bg-purple-100 text-purple-500 mr-4">
                            <i class="fa-solid fa-star text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-gray-500 text-sm">Tổng lượt đánh giá</p>
                            <p id="totalReviews" class="text-2xl font-bold text-gray-800">...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:5092/api/v1";

        // Hàm kiểm tra xem đã có Token chưa khi vừa mở trang
        window.onload = function() {
            const token = localStorage.getItem("foodtour_admin_token");
            if (token) {
                showDashboard();
                fetchDashboardStats(token);
            }
        }

        // HÀM 1: Bắn API Đăng Nhập
        async function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorText = document.getElementById("loginError");

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Lưu token vào trình duyệt
                    localStorage.setItem("foodtour_admin_token", data.data.token);
                    errorText.classList.add("hidden");
                    showDashboard();
                    fetchDashboardStats(data.data.token);
                } else {
                    errorText.innerText = "Sai tài khoản hoặc mật khẩu!";
                    errorText.classList.remove("hidden");
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                errorText.innerText = "Không thể kết nối đến Server. Bạn đã chạy dotnet run chưa?";
                errorText.classList.remove("hidden");
            }
        }

        // HÀM 2: Bắn API Lấy Thống Kê
        async function fetchDashboardStats(token) {
            try {
                const response = await fetch(`${API_BASE_URL}/dashboard/stats`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${token}` 
                    }
                });

                if (response.ok) {
                    const stats = await response.json();
                    // Đổ dữ liệu JSON lên màn hình
                    document.getElementById("totalUsers").innerText = stats.totalUsers;
                    document.getElementById("totalEateries").innerText = stats.totalEateries;
                    document.getElementById("totalPendingEateries").innerText = stats.totalPendingEateries;
                    document.getElementById("totalMenuItems").innerText = stats.totalMenuItems;
                    document.getElementById("totalReviews").innerText = stats.totalReviews;
                } else if (response.status === 401) {
                    // Nếu token hết hạn hoặc sai
                    logout();
                }
            } catch (error) {
                console.error("Lỗi lấy dữ liệu:", error);
            }
        }

        // Đăng xuất
        function logout() {
            localStorage.removeItem("foodtour_admin_token");
            document.getElementById("dashboardSection").classList.add("hidden");
            document.getElementById("loginSection").classList.remove("hidden");
        }

        function showDashboard() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("dashboardSection").classList.remove("hidden");
        }
    </script>
</body>
</html>
